[build-system]
requires = ["setuptools>=40", "wheel"]
build-backend = "setuptools.build_meta"

[tool.pytest.ini_options]
testpaths = ["src/fcbyk/tests"]
python_files = ["test_*.py"]
addopts = "-v --cov=fcbyk --cov-report=term-missing"

[tool.commitizen]
name = "cz_customize"
version = "0.2.2"
tag_format = "v$version"
changelog_file = "CHANGELOG.md"
version_files = [
    "setup.cfg:version =",
    "pyproject.toml:version ="
]

[tool.commitizen.customize]
commit_parser = '^(?P<change_type>вңЁ feat|рҹҗӣ fix|вҷ»пёҸ refactor|рҹ“қ docs|вҡЎпёҸ perf|вң… test|рҹҺЁ style)(?:\((?P<scope>[^\)]+)\))?:\s*(?P<message>.+)$'
changelog_pattern = '^(вңЁ feat|рҹҗӣ fix|вҷ»пёҸ refactor|рҹ“қ docs|вҡЎпёҸ perf|вң… test|рҹҺЁ style)'
change_type_order = [
    "вңЁ Features",
    "рҹҗӣ Bug Fixes",
    "вҷ»пёҸ Refactor",
    "рҹ“қ Documentation",
    "рҹҺЁ Styles",
    "вҡЎпёҸ Performance",
    "вң… Tests"
]

[tool.commitizen.customize.change_type_map]
"вңЁ feat" = "вңЁ Features"
"рҹҗӣ fix" = "рҹҗӣ Bug Fixes"
"вҷ»пёҸ refactor" = "вҷ»пёҸ Refactor"
"рҹ“қ docs" = "рҹ“қ Documentation"
"рҹҺЁ style" = "рҹҺЁ Styles"
"вҡЎпёҸ perf" = "вҡЎпёҸ Performance"
"вң… test" = "вң… Tests"


